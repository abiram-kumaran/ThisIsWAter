{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_styles %}
<style>
  body.auth-page { overflow: hidden; }

  .auth-scene {
    position: fixed; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }

  .auth-card {
    position: relative; z-index: 1;
    width: min(400px, 100%);
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 24px;
    padding: clamp(32px, 5vw, 44px);
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both;
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .auth-logo {
    text-align: center; margin-bottom: 8px;
    animation: fadeDown 0.6s 1.25s ease both;
  }
  .auth-subtitle {
    text-align: center; font-size: 13px;
    color: rgba(0,0,0,0.45); margin-bottom: 32px;
    animation: fadeDown 0.6s 1.35s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-group {
    margin-bottom: 18px;
    animation: fadeDown 0.6s ease both;
  }
  .form-group:nth-child(1) { animation-delay: 1.4s; }
  .form-group:nth-child(2) { animation-delay: 1.5s; }

  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: rgba(0,0,0,0.6); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%; padding: 13px 16px;
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 12px; color: #111111;
    font-size: 15px; font-family: 'Poppins', sans-serif;
    outline: none; transition: all 0.3s ease;
  }
  .form-group input::placeholder { color: rgba(0,0,0,0.35); }
  .form-group input:focus {
    border-color: #A855F7;
    background: rgba(0,0,0,0.01);
    box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.12);
  }

  .auth-btn {
    width: 100%; padding: 14px;
    background: #111111; color: #ffffff;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: all 0.3s ease;
    animation: fadeDown 0.6s 1.6s ease both;
  }
  .auth-btn:hover {
    background: #000000;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .auth-btn:active { transform: translateY(0); }

  .auth-footer {
    text-align: center; margin-top: 24px;
    font-size: 13px; color: rgba(0,0,0,0.45);
    animation: fadeDown 0.6s 1.7s ease both;
  }
  .auth-footer a {
    color: #A855F7; text-decoration: none; font-weight: 500;
    border-bottom: 1px solid rgba(168,85,247,0.3);
    transition: border-color 0.2s;
  }
  .auth-footer a:hover { border-color: #A855F7; }

  @media (max-width: 480px) {
    .auth-card { padding: 24px 20px; border-radius: 20px; }
    .form-group input { padding: 12px 14px; font-size: 14px; }
    .auth-btn { padding: 13px; font-size: 14px; }
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-scene">
  <div class="auth-card">
    <div class="auth-logo"><img src="{{ url_for('static', filename='tiw-logo.png') }}" alt="This is WAter." style="height:auto; max-height:42px; width:auto; max-width:100%; display:block; margin:0 auto 8px;"></div>
    <p class="auth-subtitle">Welcome back</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <button class="auth-btn" type="submit">Sign In</button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
    </div>
  </div>
</div>
{% endblock %}
