{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block extra_styles %}
<style>
  body.auth-page { overflow-x: hidden; overflow-y: auto; }

  .auth-scene {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: clamp(24px, 5vh, 40px) 20px;
  }

  .auth-card {
    position: relative; z-index: 1;
    width: min(420px, 100%);
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 24px;
    padding: clamp(28px, 5vw, 40px);
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both;
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .auth-logo {
    text-align: center; margin-bottom: 8px;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .auth-subtitle {
    text-align: center; font-size: 13px;
    color: rgba(0,0,0,0.45); margin-bottom: 28px;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-group { margin-bottom: 16px; animation: fadeDown 0.5s ease both; }
  .form-group:nth-child(1) { animation-delay: 0.2s; }
  .form-group:nth-child(2) { animation-delay: 0.28s; }
  .form-group:nth-child(3) { animation-delay: 0.36s; }
  .form-group:nth-child(4) { animation-delay: 0.44s; }
  .form-group:nth-child(5) { animation-delay: 0.52s; }

  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: rgba(0,0,0,0.6); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%; padding: 12px 14px;
    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 12px; color: #111111;
    font-size: 14px; font-family: 'Poppins', sans-serif;
    outline: none; transition: all 0.3s ease;
  }
  .form-group input::placeholder { color: rgba(0,0,0,0.35); }
  .form-group input:focus {
    border-color: #A855F7;
    background: rgba(0,0,0,0.01);
    box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.12);
  }

  .email-row { display: flex; gap: 8px; }
  .email-row input { flex: 1; }

  .otp-btn {
    background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.12);
    border-radius: 12px; color: #111111;
    padding: 0 16px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    font-family: 'Poppins', sans-serif;
    transition: all 0.25s ease;
  }
  .otp-btn:hover { background: rgba(0,0,0,0.08); }
  .otp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .otp-btn.sent { background: rgba(168,85,247,0.15); border-color: #A855F7; color: #A855F7; }

  .auth-btn {
    width: 100%; padding: 14px;
    background: #111111; color: #ffffff;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 600;
    font-family: 'Poppins', sans-serif;
    cursor: pointer; margin-top: 8px;
    transition: all 0.3s ease;
    animation: fadeDown 0.5s 0.6s ease both;
  }
  .auth-btn:hover {
    background: #000000;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }

  .auth-footer {
    text-align: center; margin-top: 22px;
    font-size: 13px; color: rgba(0,0,0,0.45);
    animation: fadeDown 0.5s 0.65s ease both;
  }
  .auth-footer a {
    color: #A855F7; text-decoration: none; font-weight: 500;
    border-bottom: 1px solid rgba(168,85,247,0.3);
    transition: border-color 0.2s;
  }
  .auth-footer a:hover { border-color: #A855F7; }

  .step-indicator {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 24px;
    animation: fadeDown 0.5s 0.15s ease both;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(0,0,0,0.12);
    transition: all 0.3s ease;
  }
  .step-dot.active { background: #A855F7; width: 24px; border-radius: 4px; }

  @media (max-width: 480px) {
    .auth-card { padding: 22px 18px; border-radius: 20px; }
    .form-group input { padding: 11px 12px; font-size: 14px; }
    .auth-btn { padding: 12px; font-size: 14px; }
    .otp-btn { padding: 0 12px; font-size: 11px; }
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-scene">
  <div class="auth-card">
    <div class="auth-logo"><img src="{{ url_for('static', filename='tiw-logo.png') }}" alt="This is WAter." style="height:auto; max-height:40px; width:auto; max-width:100%; display:block; margin:0 auto 8px;"></div>
    <p class="auth-subtitle">Create your account</p>

    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>

    <form method="POST" id="signupForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="email-row">
          <input type="email" id="email" name="email" placeholder="you@email.com" required />
          <button type="button" class="otp-btn" id="sendOtpBtn">Send OTP</button>
        </div>
      </div>

      <div class="form-group">
        <label for="otp">Verification Code</label>
        <input type="text" id="otp" name="otp" placeholder="4-digit code" required maxlength="4" pattern="[0-9]{4}" />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Pick a username" required />
      </div>

      <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1" placeholder="Create a password" required />
      </div>

      <div class="form-group">
        <label for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="Repeat your password" required />
      </div>

      <button class="auth-btn" type="submit">Create Account</button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const fields = ['email', 'otp', 'username', 'password1', 'password2'];
  fields.forEach((id, i) => {
    document.getElementById(id)?.addEventListener('focus', () => {
      document.querySelectorAll('.step-dot').forEach((d, j) => {
        d.classList.toggle('active', j === Math.min(Math.floor(i / 2), 2));
      });
    });
  });

  document.getElementById('sendOtpBtn').addEventListener('click', function() {
    const email = document.getElementById('email').value;
    if (!email) { alert('Please enter your email first.'); return; }

    this.textContent = 'Sending...';
    this.disabled = true;

    fetch('/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        alert(data.error);
        this.textContent = 'Send OTP';
        this.disabled = false;
      } else {
        this.textContent = 'Sent!';
        this.classList.add('sent');
        document.getElementById('otp').focus();
      }
    })
    .catch(() => {
      this.textContent = 'Send OTP';
      this.disabled = false;
      alert('Failed to send OTP. Please try again.');
    });
  });
</script>
{% endblock %}
