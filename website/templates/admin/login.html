<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — TIW</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/999ca2bb93.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-card {
      width: min(400px, 100%);
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff; margin: 0 auto 20px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%; padding: 12px 14px;
      background: #222535; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; color: #e2e8f0;
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: #6366f1; }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .error-box {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; border-radius: 10px; padding: 11px 14px;
      font-size: 13px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .back-link {
      display: block; text-align: center; margin-top: 18px;
      font-size: 12px; color: #64748b; text-decoration: none;
    }
    .back-link:hover { color: #94a3b8; }
    .warning-strip {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 22px;
      font-size: 12px; color: #fcd34d;
      display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon"><i class="fas fa-shield-alt"></i></div>
    <h1>Admin Access</h1>
    <p class="subtitle">This is WAter. — Control Panel</p>

    <div class="warning-strip">
      <i class="fas fa-exclamation-triangle"></i>
      Restricted area. Authorised personnel only.
    </div>

    {% if error %}
    <div class="error-box"><i class="fas fa-times-circle"></i>{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin.login') }}">
      <label for="username">Admin Username</label>
      <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="off"/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" required/>

      <button class="btn-login" type="submit">
        <i class="fas fa-lock" style="margin-right:6px;"></i>Sign In
      </button>
    </form>

    <a href="/" class="back-link">← Back to site</a>
  </div>
</body>
</html>
